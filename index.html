<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neospace Decor</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:"Segoe UI",Arial,sans-serif;background:#f5f3ee;color:#1f2022}
    .card{width:min(560px,92vw);padding:1.4rem;border:1px solid #ddd3c3;border-radius:14px;background:#fff;box-shadow:0 10px 28px rgba(20,25,35,.1)}
    h1{margin:0 0 .6rem;font-size:1.35rem}
    p{margin:0 0 .9rem;color:#676b73}
    .links a{margin-right:.8rem;color:#194a7a;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <h1>Neospace Decor</h1>
    <p>Redirecting to the best language for your browser...</p>
    <div class="links">
      <a href="en/index.html">English</a>
      <a href="id/index.html">Bahasa Indonesia</a>
      <a href="cn/index.html">中文</a>
    </div>
  </main>
  <script>
    (function () {
      const storageKey = "neospace-preferred-lang";
      const links = { cn: "cn/index.html", id: "id/index.html", en: "en/index.html" };

      function readPreferredLanguage() {
        try {
          const fromStorage = localStorage.getItem(storageKey);
          if (links[fromStorage]) return fromStorage;
        } catch (_) {}

        const cookies = document.cookie ? document.cookie.split(";") : [];
        for (const cookie of cookies) {
          const [rawKey, rawValue] = cookie.trim().split("=");
          if (rawKey === storageKey && links[decodeURIComponent(rawValue || "")]) {
            return decodeURIComponent(rawValue || "");
          }
        }
        return null;
      }

      function detectByBrowserLanguage() {
        const language = (navigator.language || "").toLowerCase();
        if (language.startsWith("zh")) return "cn";
        if (language.startsWith("id")) return "id";
        return "en";
      }

      const preferred = readPreferredLanguage();
      const nextLang = preferred || detectByBrowserLanguage();
      window.location.replace(links[nextLang] || links.en);
    })();
  </script>
</body>
</html>
