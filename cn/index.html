<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neospace Decor - 家居装饰</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../favicon.ico">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="../assets/logo.png" alt="Neospace Decor Logo">
            </div>
            <ul>
                <li><a href="#home">首页</a></li>
                <li><a href="#products">产品</a></li>
                <li><a href="#about">关于我们</a></li>
                <li><a href="#contact">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="slider">
            <!-- 轮播图框架 -->
            <div class="slide active">
                <img src="../assets/slider/catScratch1.jpg" alt="Cat Scratch 1">
            </div>
            <div class="slide">
                <img src="../assets/slider/catScratch2.jpg" alt="Cat Scratch 2">
            </div>
            <div class="slide">
                <img src="../assets/slider/wallPaper2.png" alt="Wallpaper 2">
            </div>
            <div class="slide">
                <img src="../assets/slider/Wallpaper3.png" alt="Wallpaper 3">
            </div>
        </div>
    </section>

    <section id="products" class="products">
        <h2>我们的产品</h2>
        <div class="category">
            <h3>Wallpaper</h3>
            <div class="slider-container">
                <button class="prev">&lt;</button>
                <div class="image-slider">
                    <div class="product-slide active">
                        <img src="../assets/products/wallpaper/wallPaper1.png" alt="Wallpaper 1">
                        <img src="../assets/products/wallpaper/wallPaper2.png" alt="Wallpaper 2">
                        <img src="../assets/products/wallpaper/Wallpaper3.png" alt="Wallpaper 3">
                    </div>
                    <div class="product-slide">
                        <img src="../assets/products/wallpaper/Wallpaper4.png" alt="Wallpaper 4">
                    </div>
                </div>
                <button class="next">&gt;</button>
            </div>
        </div>
        <div class="category">
            <h3>Catscratch</h3>
            <div class="slider-container">
                <button class="prev">&lt;</button>
                <div class="image-slider">
                    <div class="product-slide active">
                        <img src="../assets/products/catscratch/catScratch0.png" alt="Catscratch 1">
                    </div>
                </div>
                <button class="next">&gt;</button>
            </div>
        </div>
        <div class="category">
            <h3>Floorpaper</h3>
            <div class="slider-container">
                <button class="prev">&lt;</button>
                <div class="image-slider">
                    <div class="product-slide active">
                        <img src="../assets/products/floorpaper/floorpaper1.jpg" alt="Floorpaper 1">
                        <img src="../assets/products/floorpaper/floorpaper2.jpg" alt="Floorpaper 2">
                    </div>
                </div>
                <button class="next">&gt;</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2023 Neospace Decor. All rights reserved.</p>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
